name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

  deploy-to-render:
    name: Deploy to Render
    needs: build-and-test
    runs-on: ubuntu-latest
    # Tự động trigger chỉ khi commit/push thẳng lên nhánh main hoặc có PR merge vào main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Trigger Render Deploy Hook
      run: |
        echo "🚀 Triggering Deployment on Render for Trend Service..."
        
        if [ ! -z "${{ secrets.RENDER_DEPLOY_HOOK_TREND }}" ]; then
          echo "Triggering Trend Service..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_TREND }}"
        else
          echo "⚠️ RENDER_DEPLOY_HOOK_TREND secret is not set!"
        fi
        
        echo "✅ Deployment Hook Triggered Successfully."
